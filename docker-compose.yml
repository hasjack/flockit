# FlockIt docs site — static nginx (Vite build).
services:
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: flockit-web:latest
    container_name: flockit-web
    ports:
      - "${FLOCKIT_PORT:-8088}:80"
    restart: unless-stopped
    networks:
      - flockit

networks:
  flockit:
    name: flockit-network
