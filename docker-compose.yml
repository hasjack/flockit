# FlockIt docs site.
# Today: static nginx (Vite build).
# Midterm: add an `api` service for login and uncomment the /api proxy in
# client/nginx.conf — keep both on the same compose network.
services:
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: flockit-web:latest
    container_name: flockit-web
    ports:
      # Host 8080 is taken by has-client on the VPS — use 8088 by default.
      - "${FLOCKIT_PORT:-8088}:80"
    restart: unless-stopped
    networks:
      - flockit

  # --- midterm: login / account API ---
